<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Produto | StockManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-10">

    <div class="w-full max-w-lg p-8 bg-white rounded-xl shadow-lg border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-green-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-box text-green-600 text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Cadastrar Produto</h2>
            <p class="text-gray-500 text-sm">Adicione um novo item ao seu inventário</p>
        </div>

        <form action="/produtos/salvar" method="POST" class="space-y-5">
            <div>
                <label for="nome" class="block text-sm font-medium text-gray-700 mb-1">Nome do Produto</label>
                <input type="text" id="nome" name="nome" required
                    placeholder="Ex: Teclado Mecânico RGB"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
            </div>

            <div>
                <label for="categoria_id" class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                <select id="categoria_id" name="categoria_id" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none bg-white">
                    <option value="" disabled selected>Selecione uma categoria...</option>
                    {% for cat in categorias %}
                        <option value="{{ cat.id }}">{{ cat.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="preco" class="block text-sm font-medium text-gray-700 mb-1">Preço (R$)</label>
                <input type="number" id="preco" name="preco" step="0.01" min="0" required
                    placeholder="0,00"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
            </div>

            <div>
                <label for="descricao" class="block text-sm font-medium text-gray-700 mb-1">
                    Descrição <span class="text-gray-400">(opcional)</span>
                </label>
                <!-- ✅ Removido "required" para alinhar com o backend -->
                <textarea id="descricao" name="descricao" rows="3"
                    placeholder="Detalhes técnicos ou especificações..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all resize-none"></textarea>
            </div>

            <div class="flex items-center gap-4 pt-4">
                <a href="/"
                   class="flex-1 text-center py-2.5 px-4 border border-gray-300 rounded-lg text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
                <button type="submit"
                        class="flex-1 py-2.5 px-4 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-semibold shadow-md transition-all">
                    Salvar Produto
                </button>
            </div>
        </form>
    </div>

</body>
</html>
