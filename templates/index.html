<!DOCTYPE html>
<html>
<head>
    <title>Minha Loja</title>
</head>
<body>
    <h1>Lista de Produtos</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Categoria</th>
            </tr>
        </thead>
        <tbody>
            {% for produto in produtos %}
            <tr>
                <td>{{ produto.nome }}</td>
                <td>R$ {{ "%.2f"|format(produto.preco) }}</td>
                <td>{{ produto.estoque }}</td>
                <td>{{ produto.categoria.nome }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
